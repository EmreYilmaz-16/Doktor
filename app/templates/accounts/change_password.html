{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Şifre Değiştir{% endblock %}
{% block page_title %}Şifre Değiştir{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5">
    <div class="card">
      <div class="card-header bg-white py-3">
        <h6 class="mb-0 fw-semibold"><i class="bi bi-lock me-1"></i> Şifre Değiştir</h6>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% crispy form %}
          <button type="submit" class="btn btn-primary w-100 mt-3">Şifreyi Güncelle</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
