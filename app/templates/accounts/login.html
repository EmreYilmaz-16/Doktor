<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş - Klinik Takip</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a2238 0%, #2d3a5e 100%); min-height: 100vh; }
    .login-card { max-width: 420px; border-radius: 1rem; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="login-card card shadow-lg p-4 w-100 mx-3">
    <div class="text-center mb-4">
      <i class="bi bi-heart-pulse-fill text-danger" style="font-size:2.5rem"></i>
      <h4 class="mt-2 fw-bold">Klinik Takip</h4>
      <p class="text-muted small">Randevu & Hasta Yönetim Sistemi</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger alert-sm py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>
      Kullanıcı adı veya şifre hatalı.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Kullanıcı Adı</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Şifre</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" required>
        </div>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Giriş Yap
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
