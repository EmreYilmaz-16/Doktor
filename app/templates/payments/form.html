{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Ödeme Ekle{% endblock %}
{% block page_title %}Ödeme Kaydı{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7">
    <div class="card">
      <div class="card-header bg-white py-3">
        <h6 class="mb-0 fw-semibold">
          <i class="bi bi-cash-coin me-1 text-warning"></i>
          Ödeme — {{ patient.full_name }}
        </h6>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% crispy form %}
          <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-warning fw-semibold text-white">
              <i class="bi bi-check-circle me-1"></i> Kaydet
            </button>
            <a href="{% url 'patients:detail' patient.pk %}" class="btn btn-outline-secondary">İptal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
