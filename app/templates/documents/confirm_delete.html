{% extends 'base.html' %}
{% block title %}Belge Sil{% endblock %}
{% block page_title %}Belge Silme Onayı{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5">
    <div class="card border-danger">
      <div class="card-body text-center py-4">
        <i class="bi bi-trash text-danger" style="font-size:3rem"></i>
        <h5 class="mt-3">Belgeyi silmek istiyor musunuz?</h5>
        <p class="text-muted">{{ object.original_filename }}</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Evet, Sil</button>
          <a href="{% url 'documents:list' object.patient.pk %}" class="btn btn-outline-secondary">İptal</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
