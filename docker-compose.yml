version: '3.9'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-doktordb}
      - POSTGRES_USER=${DB_USER:-doktoruser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-doktorpass123}
    restart: unless-stopped
    networks:
      - doktor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-doktoruser} -d ${DB_NAME:-doktordb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - ./app:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doktor_net

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "8200:80"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - doktor_net

volumes:
  postgres_data:
  media_volume:
  static_volume:

networks:
  doktor_net:
    driver: bridge
